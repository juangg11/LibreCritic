<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registrarse - LibreCritic</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container">
        <div class="auth-card">
            <h2>Crear una cuenta</h2>

            <div th:if="${param.success}" class="alert alert-success">
                ¡Registro exitoso! Ahora puedes <a th:href="@{/login}">iniciar sesión</a>.
            </div>

            <form th:action="@{/register}" method="post" th:object="${user}">

                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" class="form-control" th:field="*{username}"
                        placeholder="Ingresa tu nombre de usuario">
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="alert alert-error"
                        style="margin-top: 0.5rem; padding: 0.5rem; font-size: 0.875rem;"></p>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}"
                        placeholder="Ingresa una contraseña segura">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="alert alert-error"
                        style="margin-top: 0.5rem; padding: 0.5rem; font-size: 0.875rem;"></p>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.875rem;">
                ¿Ya tienes una cuenta? <a th:href="@{/login}" style="color: var(--primary-color);">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>

</html>
