<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videogames Wiki - Home</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container">
        <div class="stats-card" style="margin-top: 2rem;">
            <div>
                <h3 style="color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase;">Cookie Data
                </h3>
                <p style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);">Pages Visited: <span
                        th:text="${visitCount}"></span></p>
            </div>
            <div th:if="${lastViewedGame != null}" style="text-align: right;">
                <h3 style="color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase;">Session Data
                </h3>
                <p style="font-size: 1.125rem; font-weight: 600;">Last Viewed: <span th:text="${lastViewedGame}"></span>
                </p>
            </div>
            <div th:unless="${lastViewedGame != null}" style="text-align: right;">
                <h3 style="color: var(--text-secondary); font-size: 0.875rem; text-transform: uppercase;">Session Data
                </h3>
                <p style="font-size: 1.125rem; color: var(--text-secondary);">No games viewed yet during this session
                </p>
            </div>
        </div>

        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; margin-top: 2rem;">
            <h2>All Videogames</h2>
        </div>

        <div th:if="${#lists.isEmpty(videogames)}"
            style="text-align: center; padding: 4rem; background: var(--card-bg); border-radius: 12px; border: 1px dashed var(--border-color);">
            <h3 style="color: var(--text-secondary); margin-bottom: 1rem;">No games found in the database.</h3>
            <span sec:authorize="hasRole('ROLE_ADMIN')">
                <a th:href="@{/videogames/new}" class="btn btn-primary">Add the first
                    game</a>
            </span>
        </div>

        <div class="games-grid">
            <div th:each="game : ${videogames}" class="game-card">
                <img th:if="${game.coverImagePath != null}" th:src="@{'/uploads/' + ${game.coverImagePath}}"
                    alt="Game Cover" class="game-cover">
                <div th:unless="${game.coverImagePath != null}" class="game-cover"
                    style="display:flex; align-items:center; justify-content:center; color: var(--text-secondary);">No
                    Image</div>

                <div class="game-info">
                    <h3 class="game-title" th:text="${game.title}"></h3>
                    <p class="game-developer" th:text="${game.developer}"></p>
                    <a th:href="@{'/videogames/' + ${game.id}}" class="btn btn-primary" style="width: 100%;">View
                        Details</a>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

</body>

</html>
