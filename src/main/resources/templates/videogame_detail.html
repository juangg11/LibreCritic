<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${videogame.title} + ' - Videogames Wiki'"></title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container" style="margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Game Details</h2>
            <a th:href="@{/}" class="btn"
                style="background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);">Back
                to List</a>
        </div>

        <div
            style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; md:flex-direction: row;">

            <div style="flex: 1; padding: 2rem;">
                <img th:if="${videogame.coverImagePath != null}" th:src="@{'/uploads/' + ${videogame.coverImagePath}}"
                    alt="Cover"
                    style="width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 4px 6px rgb(0 0 0 / 0.3);">
                <div th:unless="${videogame.coverImagePath != null}"
                    style="width: 100%; max-width: 400px; height: 300px; background: #2d3748; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                    No Image Provided</div>
            </div>

            <div style="flex: 2; padding: 2rem;">
                <h1 th:text="${videogame.title}"
                    style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary-color);"></h1>

                <div
                    style="display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    <div>
                        <span style="color: var(--text-secondary); font-size: 0.875rem;">Developer</span>
                        <p th:text="${videogame.developer != null and !videogame.developer.isEmpty() ? videogame.developer : 'Unknown'}"
                            style="font-weight: 600;"></p>
                    </div>
                    <div>
                        <span style="color: var(--text-secondary); font-size: 0.875rem;">Release Date</span>
                        <p th:text="${videogame.releaseDate != null ? #temporals.format(videogame.releaseDate, 'MMMM dd, yyyy') : 'Unknown'}"
                            style="font-weight: 600;"></p>
                    </div>
                </div>

                <div>
                    <h3 style="margin-bottom: 1rem;">About the game</h3>
                    <p th:text="${videogame.description != null and !videogame.description.isEmpty() ? videogame.description : 'No description provided.'}"
                        style="white-space: pre-line; color: var(--text-secondary); line-height: 1.8;"></p>
                </div>

                <div sec:authorize="hasRole('ROLE_ADMIN')"
                    style="margin-top: 3rem; display: flex; gap: 1rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                    <a th:href="@{'/videogames/' + ${videogame.id} + '/edit'}" class="btn btn-primary">Edit Game</a>
                    <form th:action="@{'/videogames/' + ${videogame.id} + '/delete'}" method="post"
                        onsubmit="return confirm('Are you sure you want to delete this game?');">
                        <button type="submit" class="btn btn-danger">Delete Game</button>
                    </form>
                </div>

            </div>
        </div>

        <div style="margin-top: 4rem;">
            <h3>User Reviews</h3>

            <div
                style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; margin-top: 1.5rem;">
                <h4>Post a Review</h4>
                <form th:action="@{/reviews/add}" method="post" style="margin-top: 1rem;">
                    <input type="hidden" name="videogameId" th:value="${videogame.id}">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Rating</label>
                        <select name="positive"
                            style="width: 100%; padding: 0.75rem; border-radius: 6px; background: #2d3748; color: white; border: 1px solid var(--border-color);">
                            <option value="true">Positive</option>
                            <option value="false">Negative</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Comment</label>
                        <textarea name="comment" required
                            style="width: 100%; padding: 0.75rem; border-radius: 6px; background: #2d3748; color: white; border: 1px solid var(--border-color); min-height: 100px; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </form>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}"
                style="margin-top: 2rem; color: var(--text-secondary); text-align: center;">
                No reviews yet. Be the first to review!
            </div>

            <div th:each="review : ${reviews}"
                style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; margin-top: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <a th:href="@{'/profile/' + ${review.user.username}}" style="text-decoration: none;">
                            <strong th:text="${review.user.username}" style="color: var(--primary-color);"></strong>
                        </a>
                        <span th:if="${review.positive}" style="color: #48bb78; margin-left: 0.5rem;">Positive</span>
                        <span th:unless="${review.positive}"
                            style="color: #f56565; margin-left: 0.5rem;">Negative</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}"
                            style="font-size: 0.8rem; color: var(--text-secondary);"></span>
                        <form sec:authorize="hasRole('ROLE_ADMIN')"
                            th:action="@{'/reviews/' + ${review.id} + '/delete'}" method="post">
                            <input type="hidden" name="videogameId" th:value="${videogame.id}">
                            <button type="submit" class="btn btn-danger"
                                style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Delete</button>
                        </form>
                    </div>
                </div>
                <p th:text="${review.comment}"
                    style="margin-top: 1rem; color: var(--text-secondary); line-height: 1.6;"></p>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

</body>

</html>
