<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Users - Videogames Wiki</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container" style="margin-top: 2rem;">
        <h2 th:text="'Search results for: ' + ${query}" style="margin-bottom: 2rem;"></h2>

        <div th:if="${#lists.isEmpty(users)}"
            style="text-align: center; padding: 4rem; background: var(--card-bg); border-radius: 12px; border: 1px dashed var(--border-color);">
            <h3 style="color: var(--text-secondary);">No users found matching your search.</h3>
        </div>

        <div class="games-grid">
            <div th:each="u : ${users}" class="game-card"
                style="padding: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center;">
                <div style="width: 80px; height: 80px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; font-weight: 700; margin-bottom: 1rem;"
                    th:text="${#strings.substring(u.username,0,1).toUpperCase()}"></div>
                <h3 th:text="${u.username}" style="margin-bottom: 0.5rem; color: var(--primary-color);"></h3>
                <p th:text="${#lists.size(u.followers)} + ' followers'"
                    style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.5rem;"></p>
                <a th:href="@{'/profile/' + ${u.username}}" class="btn btn-primary" style="width: 100%;">View
                    Profile</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

</body>

</html>
