<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - LibreCritic</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container">
        <div class="auth-card">
            <h2>Bienvenido</h2>

            <div th:if="${param.error}" class="alert alert-error">
                Usuario o contraseña inválidos.
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                Has cerrado sesión.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="remember-me" name="remember-me">
                    <label for="remember-me" style="margin-bottom: 0;">Recuérdame</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar sesión</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.875rem;">
                ¿No tienes una cuenta? <a th:href="@{/register}" style="color: var(--primary-color);">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>

</html>
