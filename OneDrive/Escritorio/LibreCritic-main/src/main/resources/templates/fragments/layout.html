<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreCritic - Reseñas de videojuegos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar" th:fragment="navbar">
        <a th:href="@{/}" class="navbar-brand" style="display: flex; align-items: center; gap: 0.5rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="color: var(--primary-color);">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                </path>
                <polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline>
                <polyline points="7.5 19.79 7.5 14.63 12 12.01 16.5 14.63 16.5 19.79"></polyline>
                <polyline points="12 22.01 12 16.89"></polyline>
                <polyline points="12 12.01 12 6.81"></polyline>
                <path d="M3.3 7l8.7 5.02 8.7-5.02"></path>
                <path d="M20.4 12.5l-3.9 2.25V19"></path>
                <path d="M3.6 12.5l3.9 2.25V19"></path>
            </svg>
            LibreCritic
        </a>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a th:href="@{/}" style="display: inline-flex; align-items: center; gap: 0.4rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Inicio
            </a>
            <a th:href="@{/profile}" sec:authorize="isAuthenticated()"
                style="display: inline-flex; align-items: center; gap: 0.4rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Perfil
            </a>

            <form th:action="@{/users/search}" method="get"
                style="display: flex; align-items: center; margin-left: 1rem;">
                <div style="position: relative; display: flex; align-items: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="position: absolute; left: 10px; color: var(--text-secondary);">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <input type="text" name="query" placeholder="Buscar usuarios..."
                        style="background: #2d3748; border: 1px solid var(--border-color); color: white; padding: 0.4rem 0.8rem 0.4rem 2rem; border-radius: 20px; outline: none; font-size: 0.9rem;">
                </div>
            </form>

            <span sec:authorize="isAuthenticated()" style="display: flex; align-items: center;">
                <span style="color: var(--text-secondary); margin-left: 1rem;">
                    Bienvenido, <span sec:authentication="name"
                        style="color: var(--primary-color); font-weight: 600;"></span>!
                </span>
                <a th:href="@{/videogames/new}" sec:authorize="hasRole('ROLE_ADMIN')"
                    style="display: inline-flex; align-items: center; gap: 0.4rem; margin-left: 1rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Agregar juego
                </a>

                <form th:action="@{/logout}" method="post"
                    style="display: inline-flex; align-items: center; margin-left: 1rem;">
                    <button type="submit" style="background:none; border:none; cursor:pointer;" class="nav-links">
                        <a href="javascript:void(0)" style="display: inline-flex; align-items: center; gap: 0.4rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" x2="9" y1="12" y2="12" />
                            </svg>
                            Cerrar sesión
                        </a>
                    </button>
                </form>
            </span>

            <span sec:authorize="!isAuthenticated()" style="display: flex; align-items: center;">
                <a th:href="@{/login}" style="display: inline-flex; align-items: center; gap: 0.4rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" x2="3" y1="12" y2="12" />
                    </svg>
                    Iniciar sesión
                </a>
                <a th:href="@{/register}" style="display: inline-flex; align-items: center; gap: 0.4rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" x2="19" y1="8" y2="14" />
                        <line x1="16" x2="22" y1="11" y2="11" />
                    </svg>
                    Registrarse
                </a>
            </span>
        </div>
    </nav>

    <div class="container" th:replace="~{::content}">
    </div>

    <footer th:fragment="footer" class="footer">
        <p>&copy; <span th:text="${#dates.year(#dates.createNow())}"></span> LibreCritic. Reseñas de videojuegos.</p>
    </footer>

</body>

</html>
